<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up</title>
    <style>
        body{
            background-color: aquamarine;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .form-container{
            background-color: antiquewhite;
            width: 350px;
            padding:25px;
        }
        .form-group{
            margin-bottom:15px;
            font-family: 'Trebuchet MS', 'Lucida Sans Unicode', 'Lucida Grande', 'Lucida Sans', Arial, sans-serif, 'Arial Narrow', Arial, sans-serif;
                font-size: 20px;
                text-decoration:underline;
        }
                button:hover{
                    background-color: rgb(4, 67, 122);
                    color: #e90b0b;
                }
                button{
                    color: rgb(44, 1, 3);
                    padding: 10px 15px;
                    margin-top: 15px;
                    background-color: rgb(204, 167, 238);
                    border-radius:7px;
                    margin-left: 100px;
                }
                input{
                    background-color: aqua;
                    border-radius: 7px;
                    ruby-overhang: auto;
                }

                                               </style>
</head>
<body>
    <div class="form-container">
    <form action="">
<div class="form-group">
    <h2 style="text-align: center;margin-bottom:20px;">Registration Form</h2> 
         <label for="">Name:</label>
        <input type="text" placeholder="Enter your name"required> 
        </div>
        <div class="form-group">
        <label for="">Email:</label>
        <input type="text" placeholder="Enter your Email"required>
        </div>
        <div class="form-group">
        <label for="">Password:</label>
        <input type="text" placeholder="Enter your Password"required> 
        </div>
        <div class="form-group">
        <label for="">Gender</label>
        <select name="Gender" id="Gender">
            </div>
            <option value="">Male</option>
            <option value="">Female</option>
        </select><br>
        <button>Register</button>
    </form>
    </div>
</body>
</html>
